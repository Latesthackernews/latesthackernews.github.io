<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog | Latest Hacker News</title>
  <meta name="description" content="Browse all articles and guides published on Latest Hacker News.">
</head>
<body>

  <h1>Blog Articles</h1>

  <ul id="posts"></ul>

  <script>
    fetch('/content/posts.json')
      .then(response => response.json())
      .then(posts => {

        const container = document.getElementById('posts');

        posts.forEach(post => {

          const li = document.createElement('li');

          li.innerHTML = `
            <a href="/blog/${post.slug}.html">
              ${post.title}
            </a>
            <p>${post.description}</p>
          `;

          container.appendChild(li);
        });

      })
      .catch(error => {
        document.getElementById('posts').innerHTML =
          "<p>Unable to load articles.</p>";
      });
  </script>

</body>
</html>
