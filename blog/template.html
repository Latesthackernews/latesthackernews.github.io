<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  <link rel="canonical" href="https://latesthackernews.github.io/blog/{{slug}}.html">

  <link rel="stylesheet" href="/css/style.css">

  <!-- Schema.org -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{title}}",
    "description": "{{description}}"
  }
  </script>
</head>

<body>

<a href="/blog/">← Back to Blog</a>

<h1>{{title}}</h1>

<div id="content">
{{content}}
</div>

<p>
<a href="{{url}}" target="_blank">External Source</a>
</p>

</body>
</html>
